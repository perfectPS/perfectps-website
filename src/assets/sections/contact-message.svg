<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 360" fill="none">
  <!-- Envelope body -->
  <rect x="60" y="100" width="320" height="200" rx="14" fill="rgba(200,168,75,0.05)" stroke="rgba(200,168,75,0.3)" stroke-width="1.5"/>

  <!-- Envelope flap (open) -->
  <path d="M60 114 L220 210 L380 114" stroke="rgba(200,168,75,0.35)" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
  <path d="M60 100 L220 180 L380 100 Z" fill="rgba(200,168,75,0.07)" stroke="rgba(200,168,75,0.3)" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Left fold crease -->
  <line x1="60" y1="300" x2="220" y2="210" stroke="rgba(200,168,75,0.15)" stroke-width="1"/>
  <!-- Right fold crease -->
  <line x1="380" y1="300" x2="220" y2="210" stroke="rgba(200,168,75,0.15)" stroke-width="1"/>

  <!-- Message card popping out -->
  <rect x="130" y="40" width="180" height="130" rx="10" fill="rgba(200,168,75,0.08)" stroke="#c8a84b" stroke-width="1.5"/>
  <rect x="146" y="60" width="148" height="8" rx="4" fill="rgba(200,168,75,0.25)"/>
  <rect x="146" y="76" width="120" height="6" rx="3" fill="rgba(200,168,75,0.15)"/>
  <rect x="146" y="90" width="132" height="6" rx="3" fill="rgba(200,168,75,0.15)"/>
  <rect x="146" y="104" width="108" height="6" rx="3" fill="rgba(200,168,75,0.12)"/>
  <!-- Send button on card -->
  <rect x="146" y="122" width="80" height="26" rx="13" fill="rgba(200,168,75,0.2)" stroke="#c8a84b" stroke-width="1"/>
  <text x="186" y="139" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10" font-weight="600" fill="#c8a84b">Send →</text>

  <!-- Sparkles -->
  <g opacity="0.7">
    <line x1="64" y1="64" x2="64" y2="76" stroke="#c8a84b" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="58" y1="70" x2="70" y2="70" stroke="#c8a84b" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <g opacity="0.5">
    <line x1="380" y1="52" x2="380" y2="64" stroke="#c8a84b" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="374" y1="58" x2="386" y2="58" stroke="#c8a84b" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <circle cx="100" cy="84" r="3" fill="#c8a84b" opacity="0.4"/>
  <circle cx="356" cy="80" r="2" fill="#c8a84b" opacity="0.35"/>
  <circle cx="80" cy="56" r="2" fill="#c8a84b" opacity="0.3"/>
  <circle cx="400" cy="68" r="2.5" fill="#c8a84b" opacity="0.35"/>
  <circle cx="60" cy="250" r="2" fill="#c8a84b" opacity="0.25"/>
  <circle cx="390" cy="260" r="2" fill="#c8a84b" opacity="0.25"/>
</svg>
