<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" width="100%" height="100%">
  <defs>
    <filter id="mShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.25" />
    </filter>
  </defs>
  <!-- Background behind phone -->
  <rect width="100%" height="100%" fill="#fafafa" />
  
  <!-- Phone Frame -->
  <rect x="20" y="20" width="360" height="760" rx="40" fill="#000000" filter="url(#mShadow)" />
  <rect x="30" y="30" width="340" height="740" rx="32" fill="#121212" />
  
  <!-- Speaker/Camera Notch -->
  <rect x="130" y="42" width="140" height="25" rx="12" fill="#000000" />
  <circle cx="160" cy="54" r="5.5" fill="#1e1e1e" />
  <rect x="180" y="52" width="40" height="4" rx="2" fill="#1e1e1e" />
  
  <!-- Phone Screen Clip Area -->
  <g transform="translate(30, 80)">
    
  <rect width="340" height="640" rx="0" fill="#fcfbf7" />
  <text x="25" y="40" font-family="sans-serif" font-weight="800" font-size="22" fill="#ea580c">YumRun</text>
  <rect x="25" y="80" width="290" height="120" rx="12" fill="#fed7aa" />
  <text x="45" y="120" font-family="sans-serif" font-weight="800" font-size="18" fill="#c2410c">50% OFF FIRST ORDER</text>

  </g>
</svg>