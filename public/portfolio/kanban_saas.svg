<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#f8fafc" />
  <rect width="100%" height="70" fill="#ffffff" />
  <text x="50" y="42" font-family="sans-serif" font-weight="800" font-size="20" fill="#4f46e5">TaskFlow</text>
  <text x="50" y="120" font-family="sans-serif" font-weight="700" font-size="24" fill="#0f172a">Project Kanban Board</text>
  <g transform="translate(50, 170)">
    <!-- Todo Column -->
    <rect width="270" height="540" rx="8" fill="#f1f5f9" />
    <text x="20" y="40" font-family="sans-serif" font-weight="700" font-size="16" fill="#475569">To Do</text>
    <!-- In Progress -->
    <rect x="290" width="270" height="540" rx="8" fill="#f1f5f9" />
    <text x="310" y="40" font-family="sans-serif" font-weight="700" font-size="16" fill="#4f46e5">In Progress</text>
    <!-- Done -->
    <rect x="580" width="270" height="540" rx="8" fill="#f1f5f9" />
    <text x="600" y="40" font-family="sans-serif" font-weight="700" font-size="16" fill="#10b981">Done</text>
  </g>
</svg>