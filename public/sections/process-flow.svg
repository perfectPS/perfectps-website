<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160" fill="none">
  <!-- Connector line -->
  <line x1="80" y1="80" x2="480" y2="80" stroke="rgba(200,168,75,0.2)" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- Gold progress fill -->
  <line x1="80" y1="80" x2="480" y2="80" stroke="#c8a84b" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.35"/>

  <!-- Node 1 -->
  <circle cx="80" cy="80" r="28" fill="rgba(200,168,75,0.1)" stroke="#c8a84b" stroke-width="1.5"/>
  <text x="80" y="86" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="16" font-weight="800" fill="#c8a84b">01</text>
  <text x="80" y="124" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.65)">Discover</text>

  <!-- Arrow 1 -->
  <path d="M113,80 L143,80" stroke="rgba(200,168,75,0.3)" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 2 -->
  <circle cx="186" cy="80" r="28" fill="rgba(200,168,75,0.07)" stroke="rgba(200,168,75,0.4)" stroke-width="1.5"/>
  <text x="186" y="86" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="16" font-weight="800" fill="rgba(200,168,75,0.7)">02</text>
  <text x="186" y="124" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.5)">Design</text>

  <!-- Arrow 2 -->
  <path d="M219,80 L249,80" stroke="rgba(200,168,75,0.3)" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 3 -->
  <circle cx="292" cy="80" r="28" fill="rgba(200,168,75,0.07)" stroke="rgba(200,168,75,0.4)" stroke-width="1.5"/>
  <text x="292" y="86" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="16" font-weight="800" fill="rgba(200,168,75,0.7)">03</text>
  <text x="292" y="124" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.5)">Build</text>

  <!-- Arrow 3 -->
  <path d="M325,80 L355,80" stroke="rgba(200,168,75,0.3)" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 4 -->
  <circle cx="398" cy="80" r="28" fill="rgba(200,168,75,0.07)" stroke="rgba(200,168,75,0.4)" stroke-width="1.5"/>
  <text x="398" y="86" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="16" font-weight="800" fill="rgba(200,168,75,0.7)">04</text>
  <text x="398" y="124" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.5)">Launch</text>

  <!-- Rocket after node 4 -->
  <g transform="translate(444,65)">
    <path d="M16,16 C16,4 24,0 24,0 C24,0 32,4 32,16 L28,20 L20,20 Z" stroke="#c8a84b" stroke-width="1.5" fill="rgba(200,168,75,0.12)" stroke-linejoin="round"/>
    <circle cx="24" cy="16" r="3.5" stroke="#c8a84b" stroke-width="1.2" fill="none"/>
    <path d="M20,20 L18,26 L24,23 L30,26 L28,20" stroke="#c8a84b" stroke-width="1.2" fill="rgba(200,168,75,0.08)" stroke-linejoin="round"/>
    <path d="M16,18 L12,22" stroke="rgba(200,168,75,0.4)" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M32,18 L36,22" stroke="rgba(200,168,75,0.4)" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <defs>
    <marker id="arr" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="rgba(200,168,75,0.4)"/>
    </marker>
  </defs>
</svg>
