<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 220" fill="none">
  <!-- Connector lines -->
  <line x1="100" y1="110" x2="200" y2="60" stroke="rgba(200,168,75,0.12)" stroke-width="1"/>
  <line x1="200" y1="60" x2="310" y2="90" stroke="rgba(200,168,75,0.12)" stroke-width="1"/>
  <line x1="310" y1="90" x2="420" y2="50" stroke="rgba(200,168,75,0.12)" stroke-width="1"/>
  <line x1="100" y1="110" x2="200" y2="155" stroke="rgba(200,168,75,0.1)" stroke-width="1"/>
  <line x1="200" y1="155" x2="310" y2="140" stroke="rgba(200,168,75,0.1)" stroke-width="1"/>
  <line x1="310" y1="140" x2="420" y2="160" stroke="rgba(200,168,75,0.1)" stroke-width="1"/>
  <line x1="200" y1="60" x2="200" y2="155" stroke="rgba(200,168,75,0.08)" stroke-width="1"/>
  <line x1="310" y1="90" x2="310" y2="140" stroke="rgba(200,168,75,0.08)" stroke-width="1"/>
  <line x1="420" y1="50" x2="420" y2="160" stroke="rgba(200,168,75,0.08)" stroke-width="1"/>
  <line x1="100" y1="110" x2="310" y2="90" stroke="rgba(200,168,75,0.06)" stroke-width="1"/>
  <line x1="200" y1="155" x2="420" y2="160" stroke="rgba(200,168,75,0.06)" stroke-width="1"/>

  <!-- Bubbles -->
  <!-- React (large, primary) -->
  <rect x="56" y="88" width="88" height="44" rx="22" fill="rgba(200,168,75,0.1)" stroke="#c8a84b" stroke-width="1.2"/>
  <text x="100" y="115" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="13" font-weight="600" fill="#c8a84b">React</text>

  <!-- TypeScript -->
  <rect x="156" y="38" width="88" height="44" rx="22" fill="rgba(200,168,75,0.06)" stroke="rgba(200,168,75,0.3)" stroke-width="1"/>
  <text x="200" y="65" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="12" font-weight="500" fill="rgba(200,168,75,0.8)">TypeScript</text>

  <!-- Node.js -->
  <rect x="268" y="68" width="84" height="44" rx="22" fill="rgba(200,168,75,0.06)" stroke="rgba(200,168,75,0.3)" stroke-width="1"/>
  <text x="310" y="95" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="12" font-weight="500" fill="rgba(200,168,75,0.8)">Node.js</text>

  <!-- WireGuard (large) -->
  <rect x="370" y="28" width="100" height="44" rx="22" fill="rgba(200,168,75,0.09)" stroke="rgba(200,168,75,0.4)" stroke-width="1.2"/>
  <text x="420" y="55" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="12" font-weight="600" fill="rgba(200,168,75,0.9)">WireGuard</text>

  <!-- PostgreSQL -->
  <rect x="156" y="133" width="88" height="44" rx="22" fill="rgba(200,168,75,0.06)" stroke="rgba(200,168,75,0.25)" stroke-width="1"/>
  <text x="200" y="160" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" font-weight="500" fill="rgba(200,168,75,0.7)">PostgreSQL</text>

  <!-- Docker -->
  <rect x="268" y="118" width="84" height="44" rx="22" fill="rgba(200,168,75,0.06)" stroke="rgba(200,168,75,0.25)" stroke-width="1"/>
  <text x="310" y="145" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="12" font-weight="500" fill="rgba(200,168,75,0.7)">Docker</text>

  <!-- Expo -->
  <rect x="374" y="138" width="92" height="44" rx="22" fill="rgba(200,168,75,0.06)" stroke="rgba(200,168,75,0.25)" stroke-width="1"/>
  <text x="420" y="165" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="12" font-weight="500" fill="rgba(200,168,75,0.7)">Expo / RN</text>

  <!-- Dots at intersections -->
  <circle cx="200" cy="60" r="3" fill="rgba(200,168,75,0.4)"/>
  <circle cx="310" cy="90" r="3" fill="rgba(200,168,75,0.4)"/>
  <circle cx="420" cy="50" r="3" fill="rgba(200,168,75,0.4)"/>
  <circle cx="200" cy="155" r="3" fill="rgba(200,168,75,0.3)"/>
  <circle cx="310" cy="140" r="3" fill="rgba(200,168,75,0.3)"/>
  <circle cx="420" cy="160" r="3" fill="rgba(200,168,75,0.3)"/>
</svg>
