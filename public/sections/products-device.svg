<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 480" fill="none">
  <!-- Phone body -->
  <rect x="60" y="20" width="200" height="440" rx="28" fill="rgba(13,27,46,0.04)" stroke="#0d1b2e" stroke-width="2"/>
  <!-- Notch -->
  <rect x="120" y="20" width="80" height="24" rx="0" fill="white"/>
  <rect x="130" y="20" width="60" height="22" rx="10" fill="rgba(13,27,46,0.08)" stroke="none"/>
  <circle cx="160" cy="31" r="4" fill="rgba(13,27,46,0.15)"/>
  <!-- Screen area -->
  <rect x="68" y="50" width="184" height="400" rx="4" fill="rgba(13,27,46,0.03)"/>

  <!-- App header bar -->
  <rect x="68" y="50" width="184" height="52" rx="4" fill="rgba(13,27,46,0.06)"/>
  <text x="160" y="81" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="14" font-weight="700" fill="#0d1b2e">PS Secure</text>

  <!-- Connected status circle -->
  <circle cx="160" cy="220" r="64" stroke="#0d1b2e" stroke-width="2" fill="rgba(13,27,46,0.03)"/>
  <circle cx="160" cy="220" r="50" stroke="rgba(200,168,75,0.35)" stroke-width="1.5" fill="rgba(200,168,75,0.04)"/>
  <!-- Shield icon inside -->
  <path d="M160 188 L178 197 L178 216 Q178 232 160 242 Q142 232 142 216 L142 197 Z"
        stroke="#c8a84b" stroke-width="2" fill="rgba(200,168,75,0.1)" stroke-linejoin="round"/>
  <path d="M153 219 L158 224 L167 213" stroke="#c8a84b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Connected label -->
  <text x="160" y="258" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" font-weight="600" fill="#22c55e">CONNECTED</text>

  <!-- Info rows -->
  <rect x="86" y="296" width="148" height="32" rx="8" fill="rgba(13,27,46,0.05)" stroke="rgba(13,27,46,0.08)" stroke-width="1"/>
  <text x="100" y="317" font-family="DM Sans,sans-serif" font-size="10" fill="rgba(13,27,46,0.5)">Protocol</text>
  <text x="222" y="317" text-anchor="end" font-family="DM Sans,sans-serif" font-size="10" font-weight="600" fill="#0d1b2e">WireGuard</text>

  <rect x="86" y="336" width="148" height="32" rx="8" fill="rgba(13,27,46,0.05)" stroke="rgba(13,27,46,0.08)" stroke-width="1"/>
  <text x="100" y="357" font-family="DM Sans,sans-serif" font-size="10" fill="rgba(13,27,46,0.5)">Logs</text>
  <text x="222" y="357" text-anchor="end" font-family="DM Sans,sans-serif" font-size="10" font-weight="600" fill="#0d1b2e">Zero-Log</text>

  <rect x="86" y="376" width="148" height="32" rx="8" fill="rgba(200,168,75,0.08)" stroke="#c8a84b" stroke-width="1"/>
  <text x="100" y="397" font-family="DM Sans,sans-serif" font-size="10" fill="rgba(13,27,46,0.5)">Kill Switch</text>
  <rect x="190" y="381" width="36" height="20" rx="10" fill="#c8a84b"/>
  <circle cx="206" cy="391" r="8" fill="white"/>

  <!-- Home indicator -->
  <rect x="140" y="446" width="40" height="4" rx="2" fill="rgba(13,27,46,0.2)"/>
</svg>
