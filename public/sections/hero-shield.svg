  <!-- Left circuit lines -->
  <polyline points="158,210 88,210 88,148" stroke="rgba(200,168,75,0.22)" stroke-width="1" fill="none"/>
  <circle cx="88" cy="148" r="3" fill="#c8a84b" opacity="0.7"/>
  <polyline points="158,290 58,290" stroke="rgba(200,168,75,0.18)" stroke-width="1" fill="none"/>
  <circle cx="58" cy="290" r="2" fill="#c8a84b" opacity="0.5"/>
  <polyline points="158,360 98,360 98,420" stroke="rgba(200,168,75,0.2)" stroke-width="1" fill="none"/>
  <circle cx="98" cy="420" r="3" fill="#c8a84b" opacity="0.6"/>

  <!-- Right circuit lines -->
  <polyline points="402,210 472,210 472,148" stroke="rgba(200,168,75,0.22)" stroke-width="1" fill="none"/>
  <circle cx="472" cy="148" r="3" fill="#c8a84b" opacity="0.7"/>
  <polyline points="402,290 502,290" stroke="rgba(200,168,75,0.18)" stroke-width="1" fill="none"/>
  <circle cx="502" cy="290" r="2" fill="#c8a84b" opacity="0.5"/>
  <polyline points="402,360 462,360 462,420" stroke="rgba(200,168,75,0.2)" stroke-width="1" fill="none"/>
  <circle cx="462" cy="420" r="3" fill="#c8a84b" opacity="0.6"/>

  <!-- Lock body -->
  <rect x="246" y="262" width="68" height="56" rx="10" fill="rgba(200,168,75,0.1)" stroke="#c8a84b" stroke-width="1.5"/>

  <!-- Lock shackle -->
  <path d="M264 262 L264 244 Q264 222 280 222 Q296 222 296 244 L296 262"
