  <!-- Keyhole -->
  <circle cx="280" cy="287" r="8" fill="#c8a84b"/>
  <rect x="276" y="291" width="8" height="16" rx="2" fill="#c8a84b"/>

  <!-- Corner hexagons -->
  <polygon points="490,74 504,82 504,98 490,106 476,98 476,82" stroke="rgba(200,168,75,0.2)" stroke-width="1" fill="none"/>
  <polygon points="70,200 82,207 82,221 70,228 58,221 58,207" stroke="rgba(200,168,75,0.15)" stroke-width="1" fill="none"/>
  <polygon points="500,360 510,366 510,378 500,384 490,378 490,366" stroke="rgba(200,168,75,0.13)" stroke-width="1" fill="none"/>
  <polygon points="52,400 62,406 62,418 52,424 42,418 42,406" stroke="rgba(200,168,75,0.13)" stroke-width="1" fill="none"/>

  <!-- Floating dots -->
  <circle cx="148" cy="96" r="2" fill="#c8a84b" opacity="0.4"/>
  <circle cx="420" cy="96" r="2" fill="#c8a84b" opacity="0.4"/>
  <circle cx="108" cy="470" r="1.5" fill="#c8a84b" opacity="0.35"/>
  <circle cx="452" cy="470" r="1.5" fill="#c8a84b" opacity="0.35"/>
  <circle cx="280" cy="510" r="2" fill="#c8a84b" opacity="0.25"/>
  <circle cx="52" cy="158" r="1.5" fill="#c8a84b" opacity="0.3"/>
  <circle cx="508" cy="158" r="1.5" fill="#c8a84b" opacity="0.3"/>
