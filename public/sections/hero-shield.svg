<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 560" fill="none">
  <!-- Glow rings -->
  <circle cx="280" cy="280" r="230" stroke="rgba(200,168,75,0.06)" stroke-width="1"/>
  <circle cx="280" cy="280" r="185" stroke="rgba(200,168,75,0.05)" stroke-width="1"/>
  <circle cx="280" cy="280" r="140" stroke="rgba(200,168,75,0.08)" stroke-width="1"/>
  <circle cx="280" cy="280" r="95" stroke="rgba(200,168,75,0.06)" stroke-width="1"/>

  <!-- Outer shield -->
  <path d="M280 58 L402 118 L402 272 Q402 390 280 468 Q158 390 158 272 L158 118 Z"
