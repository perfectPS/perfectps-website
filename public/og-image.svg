<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Dot grid pattern -->
    <pattern id="dotGrid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1.2" fill="#ffffff" opacity="0.07"/>
    </pattern>

    <!-- Radial gradient for subtle center glow -->
    <radialGradient id="centerGlow" cx="40%" cy="50%" r="55%" fx="40%" fy="50%">
      <stop offset="0%" stop-color="#0d1f38" stop-opacity="1"/>
      <stop offset="100%" stop-color="#070f1a" stop-opacity="1"/>
    </radialGradient>

    <!-- Gold gradient for shield -->
    <linearGradient id="shieldGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2c06a"/>
      <stop offset="100%" stop-color="#c8a84b"/>
    </linearGradient>

    <!-- Clip path for shield area -->
    <clipPath id="shieldClip">
      <rect x="850" y="-80" width="450" height="500"/>
    </clipPath>
  </defs>

  <!-- Dark navy background -->
  <rect width="1200" height="630" fill="#070f1a"/>

  <!-- Subtle center glow overlay -->
  <rect width="1200" height="630" fill="url(#centerGlow)"/>

  <!-- Dot grid overlay -->
  <rect width="1200" height="630" fill="url(#dotGrid)"/>

  <!-- Top edge accent line (gold, subtle) -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#c8a84b" stroke-width="3" opacity="0.8"/>

  <!-- Left vertical accent bar -->
  <rect x="72" y="60" width="3" height="510" fill="#c8a84b" opacity="0.25" rx="1.5"/>

  <!-- Decorative shield outline — top right corner -->
  <!-- Shield path: centered around 1020,200, height ~280, width ~220 -->
  <g clip-path="url(#shieldClip)" opacity="0.18">
    <!-- Outer shield -->
    <path d="M1030 60
             L1150 100
             L1150 230
             C1150 320 1030 390 1030 390
             C1030 390 910 320 910 230
             L910 100
             Z"
          fill="none"
          stroke="url(#shieldGold)"
          stroke-width="2.5"
          stroke-linejoin="round"/>
    <!-- Inner shield (smaller, inset) -->
    <path d="M1030 90
             L1122 124
             L1122 228
             C1122 304 1030 364 1030 364
             C1030 364 938 304 938 228
             L938 124
             Z"
          fill="none"
          stroke="url(#shieldGold)"
          stroke-width="1.5"
          stroke-linejoin="round"
          stroke-dasharray="6 4"/>
    <!-- Shield center mark -->
    <circle cx="1030" cy="235" r="18" fill="none" stroke="#c8a84b" stroke-width="1.5" opacity="0.6"/>
    <path d="M1020 235 L1027 243 L1040 228" fill="none" stroke="#c8a84b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>

  <!-- Second shield, larger and very faint, for depth -->
  <g opacity="0.06">
    <path d="M1060 -30
             L1240 30
             L1240 230
             C1240 370 1060 470 1060 470
             C1060 470 880 370 880 230
             L880 30
             Z"
          fill="none"
          stroke="#c8a84b"
          stroke-width="2"
          stroke-linejoin="round"/>
  </g>

  <!-- Corner bracket top-left -->
  <path d="M50 50 L50 80 M50 50 L80 50" stroke="#c8a84b" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- Corner bracket bottom-right -->
  <path d="M1150 580 L1150 550 M1150 580 L1120 580" stroke="#c8a84b" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- Horizontal rule above brand name -->
  <line x1="100" y1="222" x2="420" y2="222" stroke="#c8a84b" stroke-width="1" opacity="0.35"/>

  <!-- Brand name: perfectPS -->
  <!-- "perfect" in white, "PS" in gold -->
  <text
    x="100"
    y="310"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="96"
    font-weight="700"
    letter-spacing="-2"
    text-anchor="start">
    <tspan fill="#ffffff">perfect</tspan><tspan fill="#c8a84b">PS</tspan>
  </text>

  <!-- Tagline -->
  <text
    x="100"
    y="370"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="26"
    font-weight="400"
    fill="#a8b4c4"
    letter-spacing="0.5"
    text-anchor="start">We Build Digital Products That Matter.
  </text>

  <!-- Horizontal rule below tagline -->
  <line x1="100" y1="402" x2="320" y2="402" stroke="#c8a84b" stroke-width="1" opacity="0.35"/>

  <!-- Bottom: perfectps.com -->
  <text
    x="100"
    y="572"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="20"
    font-weight="500"
    fill="#c8a84b"
    letter-spacing="1.5"
    text-anchor="start">perfectps.com
  </text>

  <!-- Bottom accent dots -->
  <circle cx="280" cy="570" r="2" fill="#c8a84b" opacity="0.5"/>
  <circle cx="294" cy="570" r="2" fill="#c8a84b" opacity="0.3"/>
  <circle cx="308" cy="570" r="2" fill="#c8a84b" opacity="0.15"/>

  <!-- Bottom edge accent line -->
  <line x1="0" y1="630" x2="1200" y2="630" stroke="#c8a84b" stroke-width="2" opacity="0.4"/>
</svg>
