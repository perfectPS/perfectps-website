<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="38%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#112240"/>
      <stop offset="100%" stop-color="#070F1A"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="100%" stop-color="#FACC15"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60,0 L0,0 L0,60" fill="none" stroke="rgba(34,211,238,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Cyan glow behind icon -->
  <ellipse cx="220" cy="315" rx="180" ry="180" fill="rgba(34,211,238,0.06)"/>

  <!-- Pixel banana icon at left (scaled 2.1x) -->
  <g transform="translate(100, 170) scale(2.1)">
    <rect x="30" y="10" width="40" height="10" fill="url(#goldGrad)"/>
    <rect x="20" y="20" width="60" height="10" fill="url(#goldGrad)"/>
    <rect x="10" y="30" width="70" height="10" fill="url(#goldGrad)"/>
    <rect x="10" y="40" width="70" height="10" fill="url(#goldGrad)"/>
    <rect x="20" y="50" width="60" height="10" fill="url(#goldGrad)"/>
    <rect x="30" y="60" width="50" height="10" fill="url(#goldGrad)"/>
    <rect x="40" y="70" width="40" height="10" fill="url(#goldGrad)"/>
    <rect x="40" y="80" width="40" height="10" fill="url(#goldGrad)"/>
    <rect x="30" y="90" width="50" height="10" fill="url(#goldGrad)"/>
    <rect x="20" y="100" width="50" height="10" fill="url(#goldGrad)"/>
    <rect x="10" y="110" width="50" height="10" fill="url(#goldGrad)"/>
    <rect x="50" y="20"  width="10" height="10" fill="#CA8A04"/>
    <rect x="60" y="30"  width="10" height="10" fill="#CA8A04"/>
    <rect x="60" y="40"  width="10" height="10" fill="#CA8A04"/>
    <rect x="50" y="50"  width="10" height="10" fill="#CA8A04"/>
    <rect x="50" y="60"  width="10" height="10" fill="#CA8A04"/>
    <rect x="50" y="70"  width="10" height="10" fill="#CA8A04"/>
    <rect x="50" y="80"  width="10" height="10" fill="#CA8A04"/>
    <rect x="50" y="90"  width="10" height="10" fill="#CA8A04"/>
    <rect x="50" y="100" width="10" height="10" fill="#CA8A04"/>
    <rect x="40" y="110" width="10" height="10" fill="#CA8A04"/>
    <path d="M20,0 L60,0 L60,10 L70,10 L70,20 L80,20 L80,110 L70,110 L70,120 L20,120 L20,110 L10,110 L10,20 L20,20 Z"
          fill="none" stroke="#22D3EE" stroke-width="2.5"/>
  </g>

  <!-- Vertical separator -->
  <line x1="420" y1="180" x2="420" y2="450" stroke="rgba(34,211,238,0.25)" stroke-width="1.5"/>

  <!-- Brand name — uses web fonts (Chakra Petch loaded on any social preview renderer that supports it) -->
  <text x="468" y="295"
        font-family="'Chakra Petch', monospace"
        font-weight="700"
        font-size="82"
        fill="#FFFFFF">PerfectPS</text>

  <!-- Gold "PS" overlay -->
  <text x="806" y="295"
        font-family="'Chakra Petch', monospace"
        font-weight="700"
        font-size="82"
        fill="url(#goldGrad)">PS</text>

  <!-- Tagline -->
  <text x="472" y="358"
        font-family="'Chakra Petch', monospace"
        font-weight="700"
        font-size="20"
        fill="#22D3EE"
        letter-spacing="7">DIGITAL FORTRESS</text>

  <!-- Description -->
  <text x="472" y="415"
        font-family="'DM Sans', system-ui, sans-serif"
        font-weight="400"
        font-size="22"
        fill="rgba(143,163,188,0.8)">WireGuard VPN · Web &amp; Mobile Studio · Middle East</text>

  <!-- Domain badge -->
  <rect x="472" y="455" width="186" height="34" rx="6"
        fill="rgba(34,211,238,0.08)" stroke="rgba(34,211,238,0.25)" stroke-width="1"/>
  <text x="565" y="478"
        font-family="'DM Sans', system-ui, sans-serif"
        font-weight="700"
        font-size="14"
        fill="rgba(34,211,238,0.85)"
        text-anchor="middle"
        letter-spacing="1">perfectps.com</text>

  <!-- Corner brackets -->
  <g stroke="rgba(34,211,238,0.3)" stroke-width="2" fill="none">
    <path d="M32,32 L32,52 L52,52"/>
    <path d="M32,32 L52,32"/>
    <path d="M1168,598 L1148,598 L1148,578"/>
    <path d="M1168,598 L1168,578"/>
  </g>
</svg>
