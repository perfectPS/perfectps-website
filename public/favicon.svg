<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&amp;display=swap');
    </style>

    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#112240"/>
      <stop offset="100%" stop-color="#070F1A"/>
    </radialGradient>

    <linearGradient id="cyanBorder" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>

    <linearGradient id="psGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="100%" stop-color="#FACC15"/>
    </linearGradient>

    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>

  <!-- Subtle grid backdrop -->
  <g stroke="#22D3EE" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
  </g>

  <!-- Banana pixel art
       Scale 1.75 → banana is 168×196px
       Centred horizontally at x=200, banana body centre at y=163
       translate(116, 65) scale(1.75)
  -->
  <g transform="translate(116, 65) scale(1.75)" filter="url(#glow)">

    <!-- Cyan pixel-step outline -->
    <path d="M 64 0 L 80 0 L 80 16 L 88 16 L 88 32 L 96 32
             L 96 64 L 88 64 L 88 80 L 80 80 L 80 96 L 64 96
             L 64 104 L 48 104 L 48 112 L 16 112 L 16 104
             L 0 104 L 0 88 L 16 88 L 16 80 L 32 80 L 32 64
             L 48 64 L 48 48 L 56 48 L 56 32 L 64 32 Z"
          fill="none" stroke="url(#cyanBorder)" stroke-width="4"
          stroke-linejoin="miter" opacity="0.95"/>

    <!-- Stem cap -->
    <rect x="64" y="0"  width="16" height="16" fill="#22D3EE"/>
    <!-- Upper curve -->
    <rect x="64" y="16" width="16" height="16" fill="#CA8A04"/>
    <rect x="72" y="16" width="16" height="16" fill="#FACC15"/>
    <rect x="56" y="32" width="16" height="16" fill="#EAB308"/>
    <rect x="72" y="32" width="16" height="16" fill="#FACC15"/>
    <rect x="48" y="48" width="16" height="16" fill="#CA8A04"/>
    <rect x="64" y="48" width="32" height="16" fill="#FACC15"/>
    <!-- Mid body -->
    <rect x="40" y="64" width="16" height="16" fill="#CA8A04"/>
    <rect x="56" y="64" width="40" height="16" fill="#FACC15"/>
    <rect x="32" y="80" width="16" height="16" fill="#CA8A04"/>
    <rect x="48" y="80" width="40" height="16" fill="#FACC15"/>
    <!-- Lower curve -->
    <rect x="16" y="96" width="16" height="16" fill="#CA8A04"/>
    <rect x="32" y="96" width="32" height="16" fill="#EAB308"/>
    <!-- Brown tip -->
    <rect x="0"  y="88" width="16" height="16" fill="#854D0E"/>
  </g>

  <!-- "PS" lettermark — Chakra Petch 700, gold, centred below banana -->
  <text x="200" y="325"
        font-family="'Chakra Petch', monospace"
        font-weight="700"
        font-size="46"
        fill="url(#psGold)"
        text-anchor="middle"
        letter-spacing="10">PS</text>

  <!-- Corner bracket decorations -->
  <g stroke="#22D3EE" stroke-width="2.5" fill="none" stroke-linecap="square" opacity="0.4">
    <path d="M 24 40 L 24 24 L 40 24"/>
    <path d="M 376 40 L 376 24 L 360 24"/>
    <path d="M 24 360 L 24 376 L 40 376"/>
    <path d="M 376 360 L 376 376 L 360 376"/>
  </g>
</svg>
