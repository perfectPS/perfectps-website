  </defs>
  <!-- Radar backdrop glow -->
  <ellipse cx="1150" cy="120" rx="600" ry="600" fill="url(#rg)"/>
  <!-- Concentric circles from upper-right -->
  <circle cx="1200" cy="80" r="120" stroke="#c8a84b" stroke-opacity="0.1" stroke-width="1" fill="none"/>
  <circle cx="1200" cy="80" r="240" stroke="#c8a84b" stroke-opacity="0.08" stroke-width="1" fill="none"/>
  <circle cx="1200" cy="80" r="380" stroke="#c8a84b" stroke-opacity="0.06" stroke-width="1" fill="none"/>
  <circle cx="1200" cy="80" r="540" stroke="#c8a84b" stroke-opacity="0.05" stroke-width="0.75" fill="none"/>
  <circle cx="1200" cy="80" r="720" stroke="#c8a84b" stroke-opacity="0.04" stroke-width="0.75" fill="none"/>
  <circle cx="1200" cy="80" r="920" stroke="#c8a84b" stroke-opacity="0.03" stroke-width="0.5" fill="none"/>
  <!-- Grid lines -->
  <line x1="1200" y1="-900" x2="1200" y2="900" stroke="#c8a84b" stroke-opacity="0.06" stroke-width="0.5"/>
  <line x1="0" y1="80" x2="2000" y2="80" stroke="#c8a84b" stroke-opacity="0.06" stroke-width="0.5"/>
  <line x1="700" y1="-400" x2="1700" y2="600" stroke="#c8a84b" stroke-opacity="0.04" stroke-width="0.5"/>
  <line x1="1700" y1="-400" x2="700" y2="600" stroke="#c8a84b" stroke-opacity="0.04" stroke-width="0.5"/>
  <!-- Nodes at intersections -->
  <circle cx="1200" cy="80" r="5" fill="#c8a84b" fill-opacity="0.25"/>
  <circle cx="1200" cy="200" r="3" fill="#c8a84b" fill-opacity="0.15"/>
  <circle cx="1320" cy="80" r="3" fill="#c8a84b" fill-opacity="0.15"/>
  <circle cx="960" cy="80" r="2" fill="#c8a84b" fill-opacity="0.12"/>
  <circle cx="1200" cy="320" r="2" fill="#c8a84b" fill-opacity="0.1"/>
  <!-- Scattered nodes -->
  <circle cx="200" cy="150" r="2" fill="#c8a84b" fill-opacity="0.08"/>
  <circle cx="450" cy="380" r="1.5" fill="#c8a84b" fill-opacity="0.07"/>
  <circle cx="680" cy="220" r="2" fill="#c8a84b" fill-opacity="0.08"/>
