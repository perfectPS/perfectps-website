  <!-- Shield outline bottom-left, faint -->
  <path d="M80 750 L80 660 L200 630 L320 660 L320 750 C320 810 200 840 200 840 C200 840 80 810 80 750Z" stroke="#c8a84b" stroke-opacity="0.06" stroke-width="1" fill="none"/>
</svg>
