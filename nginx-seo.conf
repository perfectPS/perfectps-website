# nginx-seo.conf — SEO + security snippet for perfectps.com
# Include this inside the server {} block that serves the SPA.
# Example: include /etc/nginx/snippets/nginx-seo.conf;

    # ── Security & SEO headers (applied to every response) ──────────────────
    add_header X-Robots-Tag              "index, follow"                  always;
    add_header X-Content-Type-Options    "nosniff"                        always;
    add_header X-Frame-Options           "SAMEORIGIN"                     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Root redirect → /en/ ─────────────────────────────────────────────────
    location = / {
        return 301 https://perfectps.com/en/;
    }

    # ── Deleted /work pages → 410 Gone ──────────────────────────────────────
    location ~ ^/(en|ar)/work {
        return 410;
    }

    # ── Long-lived cache for immutable static assets ─────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Short cache for HTML files ───────────────────────────────────────────
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── SPA fallback (handles client-side routing + proper 404 via app) ──────
    location / {
        try_files $uri $uri/ /index.html;
    }
