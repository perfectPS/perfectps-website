<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>perfectPS — Server Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #020C15;
      color: #fff;
      font-family: 'Chakra Petch', monospace, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 24px;
    }
    .badge {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #00EEFF;
      border: 1px solid rgba(0,238,255,0.3);
      padding: 6px 16px;
    }
    h1 { font-size: 42px; font-weight: 700; }
    h1 span { color: #00EEFF; }
    p { color: #6b7280; font-size: 14px; letter-spacing: 1px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #22c55e;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="badge">Server Test</div>
  <h1>Perfect<span>PS</span></h1>
  <div class="status">
    <div class="dot"></div>
    Server is live — 141.147.135.2
  </div>
  <p>perfectps.com · Domain test page</p>
</body>
</html>
